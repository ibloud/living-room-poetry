<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIVING ROOM POETRY - Alpha Prototype</title>
    <style>
        :root {
            --bg-color: #0f0f13;
            --text-color: #d1d1e0;
            --accent-color: #ff4a5a;
            --panel-bg: #181822;
            --border-color: #2b2b3d;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        #game-container {
            width: 100%;
            max-width: 650px;
            background: var(--panel-bg);
            border: 2px solid var(--border-color);
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h1 {
            color: var(--accent-color);
            font-size: 1.6rem;
            text-align: center;
            border-bottom: 2px double var(--border-color);
            padding-bottom: 10px;
            margin-top: 0;
            letter-spacing: 2px;
        }

        #stats-bar {
            display: flex;
            justify-content: space-between;
            background: rgba(0,0,0,0.3);
            padding: 10px;
            border: 1px solid var(--border-color);
            margin-bottom: 20px;
            font-size: 0.85rem;
        }

        .stat span {
            color: var(--accent-color);
            font-weight: bold;
        }

        #story-text {
            line-height: 1.6;
            margin-bottom: 25px;
            font-size: 1rem;
            min-height: 150px;
            white-space: pre-line;
        }

        #choices-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .choice-btn {
            background: transparent;
            color: var(--text-color);
            border: 1px solid var(--border-color);
            padding: 12px 15px;
            text-align: left;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.9rem;
            transition: all 0.2s ease-index;
            border-radius: 4px;
        }

        .choice-btn:hover {
            background: var(--accent-color);
            color: #000;
            border-color: var(--accent-color);
            font-weight: bold;
        }

        .lyric-toast {
            font-style: italic;
            color: #8a8a9e;
            border-left: 3px solid var(--accent-color);
            padding-left: 10px;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

<div id="game-container">
    <h1>LIVING ROOM POETRY</h1>
    
    <div id="stats-bar">
        <div class="stat">Tea Quality: <span id="stat-tea">100%</span></div>
        <div class="stat">Comfort: <span id="stat-comfort">50%</span></div>
        <div class="stat">Brain Rot: <span id="stat-rot">0%</span></div>
    </div>

    <div id="story-text">Loading reality...</div>
    <div id="choices-container"></div>
</div>

<script>
    // Game State
    const state = {
        tea: 100,
        comfort: 50,
        brainRot: 0,
        inventory: [],
        hoursPassed: 0
    };

    const passages = {
        start: {
            text: "You are sitting by yourself on the sofa. The world outside is complex, scary, and demands energy. In here, it's just you, a screen, and a mug of PG Tips. So far, you haven't made it off the sofa. \n\nSo far, so good. What is your play?",
            choices: [
                { text: "Take a perfect, milky sip of tea", target: "drink_tea" },
                { text: "Stare at the TV remote control", target: "remote" },
                { text: "Examine the snack crumbs on your chest", target: "snacks" }
            ]
        },
        drink_tea: {
            lyric: "PG tips. Splash of milk. Two sugars. Perfect.",
            text: "The tea hits your throat. It's more stirring than silver sterling spoons in a ready-made cup. Your comfort spikes, but your mug is running lower.",
            effects: { tea: -20, comfort: 15 },
            choices: [
                { text: "Look at the TV remote", target: "remote" },
                { text: "Contemplate productivity... then ignore it", target: "contemplate" }
            ]
        },
        remote: {
            lyric: "Now pass me the remote control. Steer that and binge documentaries. That's how I roll.",
            text: "The remote control sits heavy in your hand. You have the power of the BBC, Sky Plus, and endless trash media. Where are we steering this ship?",
            choices: [
                { text: "Watch 'Die Hard 3' in your slippers", target: "die_hard" },
                { text: "Put on some reality TV ('Made in Chelsea')", target: "trash_tv" },
                { text: "Watch 'Kill Bill' while stacking mugs", target: "kill_bill" }
            ]
        },
        die_hard: {
            lyric: "Chilling in my slippers watching Die Hard three...",
            text: "John McClane is running around New York. You are completely static. It is a beautiful contrast. Your soul feels cleansed, but your physical joints are seizing up.",
            effects: { comfort: 20, brainRot: -5 },
            choices: [
                { text: "Reach for a packet of Cheetos & Doritos", target: "snacks" },
                { text: "Check your phone", target: "xbox" }
            ]
        },
        trash_tv: {
            lyric: "People watch reality shows but ignore reality. If you want to watch Made in Chelsea, please could you leave?",
            text: "You watch high-society drama. It's awful. You feel an immediate, creeping sensation of brain rot. You want to lose the will to breathe, but you can't turn it off.",
            effects: { brainRot: 25, comfort: -10 },
            choices: [
                { text: "Turn this garbage off and play Xbox instead", target: "xbox" },
                { text: "Turn off the TV entirely and just sit in silence", target: "start" }
            ]
        },
        kill_bill: {
            lyric: "I made a tower out of mugs while I'm watching Kill Bill.",
            text: "You start stacking empty mugs on the coffee table. You make a surprisingly stable tower of three mugs while Beatrix Kiddo slices through the Crazy 88.\n\nYour brain is active. Your room is a mess.",
            effects: { comfort: 5, brainRot: -10 },
            choices: [
                { text: "Balance a fourth mug on top", target: "mug_tower_collapse" },
                { text: "Stop while you're ahead and look for food", target: "snacks" }
            ]
        },
        mug_tower_collapse: {
            text: "The tower wobbles. Gravitational forces take over. The sterling silver mugs collapse with a loud clatter onto the rug. You've made a state of things.",
            effects: { comfort: -15 },
            choices: [
                { text: "Sigh and go back to the couch", target: "start" }
            ]
        },
        snacks: {
            lyric: "Chewing on a packet of Cheetos mixed with some sour and spicy Doritos. But you went and spilt it on the floor...",
            text: "You open the bags, but your lazy grip slips. A colorful cascade of orange dust and triangular corn chips covers your carpet. \n\nDo you respect the floor?",
            choices: [
                { text: "Invoke the 3-second rule. Eat them anyway.", target: "eat_floor" },
                { text: "Leave them. They belong to the carpet now.", target: "leave_snacks" }
            ]
        },
        eat_floor: {
            lyric: "That's cool, they're still good to eat—the three-second rule!",
            text: "You scramble down. You consume floor-spiced Doritos. Your stomach is full, but your self-respect takes a minor blow. You finish it off by eating 20 After Eights.",
            effects: { comfort: 10, brainRot: 5 },
            choices: [
                { text: "Your stomach feels weird. Retreat to Xbox.", target: "xbox" }
            ]
        },
        leave_snacks: {
            text: "You let the crumbs lie. A monument to your laziness. You stare at them. They stare back.",
            effects: { comfort: -5 },
            choices: [
                { text: "Crawl back to your tea", target: "drink_tea" }
            ]
        },
        xbox: {
            lyric: "My Xbox 360 calls me to GTA... I played so much Halo I've got arthritis in my thumbs.",
            text: "You fire up the console. The green ring of light glows. You play so aggressively you can feel a phantom ache in your joints.",
            effects: { brainRot: 10, comfort: 15 },
            choices: [
                { text: "Keep playing until your thumbs fall off", target: "game_over_xbox" },
                { text: "Shut it down. This is dumb. It's time to end the cycle.", target: "ending" }
            ]
        },
        contemplate: {
            lyric: "Ever wonder if you should do something more productive and good?",
            text: "You think about getting up. Washing the mugs. Writing actual poetry instead of just letting the brain bounce like a screensaver. \n\nThe thought passes. You sit back down.",
            effects: { comfort: 5, brainRot: -5 },
            choices: [
                { text: "Go back to the start", target: "start" }
            ]
        },
        game_over_xbox: {
            text: "You play until 4:00 AM. Your brain is absolute mush. Your thumbs are swollen. Patrick Swayze is on the screen now, and you're eating cold Shreddies straight out of the box like a complete animal. You have transcended.",
            effects: { comfort: -30, brainRot: 50 },
            choices: [
                { text: "Wake up and start the day over", target: "reset" }
            ]
        },
        ending: {
            lyric: "I've got to go now, see you later alligator, starch potato. Bicycle. Pigeon.",
            text: "You turn off the screen. You stand up. You look around the living room. It's a mess of tea mugs and snack wrappers, but you're finally off the sofa.\n\n\"Living room poetry, that's how we're living.\"",
            choices: [
                { text: "Play Again", target: "reset" }
            ]
        }
    };

    function updateStats() {
        document.getElementById('stat-tea').innerText = state.tea + "%";
        document.getElementById('stat-comfort').innerText = state.comfort + "%";
        document.getElementById('stat-rot').innerText = state.brainRot + "%";
    }

    function goToPassage(id) {
        if (id === 'reset') {
            state.tea = 100;
            state.comfort = 50;
            state.brainRot = 0;
            id = 'start';
        }

        const passage = passages[id];
        if (!passage) return;

        // Apply effects
        if (passage.effects) {
            for (const [key, value] of Object.entries(passage.effects)) {
                state[key] = Math.max(0, Math.min(100, state[key] + value));
            }
        }
        updateStats();

        // Render Text
        const textContainer = document.getElementById('story-text');
        textContainer.innerHTML = "";

        if (passage.lyric) {
            const lyricDiv = document.createElement('div');
            lyricDiv.className = 'lyric-toast';
            lyricDiv.innerText = `🎵 "${passage.lyric}"`;
            textContainer.appendChild(lyricDiv);
        }

        const bodyText = document.createElement('div');
        bodyText.innerText = passage.text;
        textContainer.appendChild(bodyText);

        // Render Choices
        const choicesContainer = document.getElementById('choices-container');
        choicesContainer.innerHTML = "";

        passage.choices.forEach(choice => {
            const button = document.createElement('button');
            button.className = 'choice-btn';
            button.innerText = choice.text;
            button.onclick = () => goToPassage(choice.target);
            choicesContainer.appendChild(button);
        });
    }

    // Init
    goToPassage('start');
</script>

</body>
</html>
